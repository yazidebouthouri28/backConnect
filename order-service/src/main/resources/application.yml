server:
  port: 8083

spring:
  application:
    name: order-service

  # ============================
  # Database Configuration
  # ============================
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3308}/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:orderservice}
    password: ${DB_PASSWORD:orderservice123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  # ============================
  # Kafka Configuration
  # ============================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
      acks: all
      retries: 3
    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # ============================
  # Redis Configuration
  # ============================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # ============================
  # Jackson
  # ============================
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ============================
# Inter-Service Communication
# ============================
services:
  product-service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8082}

# ============================
# Actuator
# ============================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ============================
# OpenAPI
# ============================
springdoc:
  api-docs:
    path: /api/orders/v3/api-docs
  swagger-ui:
    path: /api/orders/swagger-ui.html

# ============================
# Logging
# ============================
logging:
  level:
    tn.esprit.orderservice: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
