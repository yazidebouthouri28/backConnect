server:
  port: 8088

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # ============================
      # Global CORS Configuration
      # ============================
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # ============================
      # Default Filters
      # ============================
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      # ============================
      # Route Definitions (CORRIGÉ)
      # ============================
      routes:
        # --- Authentication Routes (NO JWT required) ---
        - id: auth-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # --- User Service Routes (BackConnect) ---
        - id: user-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/users/**, /api/wallets/**, /api/wishlists/**, /api/transactions/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

        # --- Product Service Routes ---
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**, /api/categories/**, /api/reviews/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

        # --- Product Service Public Routes (no auth for browsing) ---
        - id: product-service-public
          uri: http://localhost:8082
          predicates:
            - Path=/api/products
            - Method=GET
          filters:
            - StripPrefix=0
          order: -1  # Higher priority (processed first)

        # --- Order Service Routes ---
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**, /api/cart/**, /api/shipping-addresses/**, /api/inventory/**, /api/warehouses/**, /api/rentals/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

        # --- Inventory Service Routes (si nécessaire) ---
        - id: inventory-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

        # --- Payment Service Routes (si nécessaire) ---
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0
            - JwtAuthentication

  # ============================
  # Redis Configuration (CORRIGÉ)
  # ============================
  data:
    redis:
      host: localhost
      port: 6379

# ============================
# JWT Configuration (CORRIGÉ)
# ============================
jwt:
  secret: ecommerce-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-security

# ============================
# Actuator
# ============================
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

# ============================
# Logging
# ============================
logging:
  level:
    org.springframework.cloud.gateway: INFO
    tn.esprit.gateway: DEBUG