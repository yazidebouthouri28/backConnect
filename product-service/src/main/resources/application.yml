server:
  port: 8082

spring:
  application:
    name: product-service

  # ============================
  # Database Configuration (MODIFIÉ)
  # ============================
  datasource:
    url: jdbc:mysql://localhost:3306/product_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false

  # ============================
  # Kafka Configuration
  # ============================
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
      acks: all
      retries: 3
    consumer:
      group-id: product-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # ============================
  # Redis Configuration
  # ============================
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # ============================
  # Jackson Configuration
  # ============================
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ============================
# Actuator
# ============================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ============================
# OpenAPI
# ============================
springdoc:
  api-docs:
    path: /api/products/v3/api-docs
  swagger-ui:
    path: /api/products/swagger-ui.html

# ============================
# Logging
# ============================
logging:
  level:
    tn.esprit.productservice: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN