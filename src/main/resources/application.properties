# Server Configuration
server.port=8080

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/campconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/campconnect_metadata

# JWT Configuration
camping.app.jwtSecret=SecretKeyWithAtLeast256BitsForSecurityComplexity1234567890
camping.app.jwtExpirationMs=86400000

# Logging
logging.level.org.springframework.security=DEBUG

spring.main.allow-bean-definition-overriding=true

# Mail Configuration (Example for Mailtrap or Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App Specific Configuration
camping.app.baseUrl=http://localhost:8080
