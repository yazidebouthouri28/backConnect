# Spring application
spring.application.name=projetPi
server.port=8089

# Date format
spring.mvc.format.date=yyyy-MM-dd

### DATABASE - MongoDB ###
spring.data.mongodb.uri=mongodb://localhost:27017/ProjetPi

### JPA / HIBERNATE - DISABLED ###
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

### JWT Configuration ###
jwt.secret=ecommerce-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
jwt.expiration=86400000

### LOGGING ###
logging.level.root=info
logging.level.tn.esprit.projetPi=debug
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level - %logger{45} - %msg %n
logging.level.org.springframework.web=DEBUG
logging.level.org.springdoc=DEBUG
logging.level.org.springdoc.core=DEBUG
logging.level.io.swagger=DEBUG
logging.level.tn.esprit.projetPi.controllers=DEBUG

### SPRINGDOC OPENAPI CONFIGURATION ###
# Activation et chemins de base
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Configuration de l'interface Swagger UI
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.csrf.enabled=false

# Scan des packages - CORRIGÉ : uniquement le package avec 's'
springdoc.packages-to-scan=tn.esprit.projetPi.controllers
springdoc.paths-to-match=/api/**,/auth/**
springdoc.show-actuator=false

# Format de sortie
springdoc.writer-with-order=true
springdoc.writer-with-default-pretty-printer=true
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json

# Cache et performance
springdoc.cache.disabled=true
springdoc.api-docs.resolve-schema-properties=true
springdoc.remove-broken-reference-definitions=true

### CONFIGURATION DES RESSOURCES STATIQUES ###
# Commenté car nous utilisons un contrôleur de redirection
# spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/
# spring.web.resources.cache.period=0
# spring.mvc.static-path-pattern=/**
# spring.web.resources.add-mappings=true

### CONFIGURATION DU SERVEUR ###
server.error.include-message=always
server.error.include-binding-errors=always
server.servlet.context-path=
server.error.path=/error
server.error.whitelabel.enabled=false

### CONFIGURATION JACKSON ###
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC

### CONFIGURATION MULTIPART ###
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

### URLs DE TEST ###
# Documentation JSON : http://localhost:8089/v3/api-docs
# Swagger UI : http://localhost:8089/swagger-ui.html
# Swagger UI alternatif : http://localhost:8089/swagger-ui/index.html
# Webjars : http://localhost:8089/webjars/swagger-ui/5.18.2/index.html