# Test Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NOT_FIXED=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Mongo Mock or Embedded for tests (Optional, but let's disable for basic tests)
spring.data.mongodb.uri=mongodb://localhost:27017/testdb

# Security
camping.app.jwtSecret=TestSecretKeyWithAtLeast256BitsForSecurityComplexity1234567890
camping.app.jwtExpirationMs=3600000
